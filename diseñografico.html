<html lang="en">

<body>

<div class="logoportada">
<a href="portfolio.html">
<img class="logoportada2" src="assets/logo circular.png" alt="milogo">
</a>
</div>

<div class="cabecera">
<h1>Diseño gráfico</h1>
</div>

<section class="contenedorimagenes">
<img src="assets/CARTEL 2.avif" alt="Cartel Coraline">
<img src="assets/TFG FINAL POR PLIEGOS_page-0001.avif" alt="Revista Arte y Publicidad">
<img src="assets/EL CORREO (1).avif" alt="Cartel El Correo">
<img src="assets/Sin título-2.webp" alt="Gráfica rrss">
<img src="assets/italica.webp" alt="Cartel Italica">
<img src="assets/HISTORIAS.webp" alt="Gráfica rrss">
<img src="assets/¡NEWSLETTER!.webp" alt="Portada newsletter">
<img src="assets/Historias instagram 2.webp" alt="Gráfica rrss">
<img src="assets/HISTORIAS (4).webp" alt="Gráfica rrss">
<img src="assets/banner movil cyber monday.webp" alt="Banner móvil">
<img src="assets/portada bellavista.webp" alt="Portada catálogo inmobiliario">
<img src="assets/Banner HOME version escritorio copia.webp" alt="Banner HOME">

</section>

<div class="habilidadcarteleria">

<h2>Cartelería</h2>

<div class="gridcarteles">

<div class="cartel">
<img src="assets/CARTEL 2.avif" alt="Cartel Coraline" class="imagenproyecto">
<h3>Los mundos de Coraline</h3>
<p>Idea de cartel para la película dirigida por Henry Selick</p>
</div>

<div class="cartel">
<img src="assets/EL CORREO (1).avif" alt="Cartel El Correo" class="imagenproyecto">
<h3>El Correo</h3>
<p>Idea de cartel para la película de Daniel Calparsoro</p>
</div>

<div class="cartel">
<img src="assets/italica.webp" alt="Cartel Italica" class="imagenproyecto">
<h3>Itálica</h3>
<p>Idea de cartel realizado para la promoción turística del conjunto arqueológico de Itálica en Sevilla.</p>
</div>

</div>

</div>

<!-- VISOR -->

<div id="visor">
<span id="cerrar">&times;</span>
<img id="imagenGrande">
</div>

<script>

const imagenes = document.querySelectorAll(".imagenproyecto");
const visor = document.getElementById("visor");
const imagenGrande = document.getElementById("imagenGrande");
const cerrar = document.getElementById("cerrar");

imagenes.forEach(img => {
img.addEventListener("click", () => {
visor.style.display = "flex";
imagenGrande.src = img.src;
});
});

cerrar.addEventListener("click", () => {
visor.style.display = "none";
});

</script>

</body>
</html>
