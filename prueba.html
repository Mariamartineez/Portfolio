<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Flipbook Funcional</title>

    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* El contenedor debe tener el doble de ancho que una página */
        #flipbook {
            width: 800px;
            height: 500px;
        }

        /* Estilo para cada página individual */
        #flipbook .page {
            width: 400px;
            height: 500px;
            background-color: white;
            line-height: 500px;
            text-align: center;
            font-family: sans-serif;
            font-size: 24px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-weight: bold;
            color: #333;
        }

        /* Páginas duras (portada y contra) */
        #flipbook .hard {
            background-color: #f1c40f !important;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="flipbook">
        <div class="hard"> PORTADA </div>
        <div class="assets"> "assets/TFG FINAL POR PAGS_p1(pdfgear.com)_1_11zon.webp" 1 </div>
        <div class="page"> "assets/TFG FINAL POR PAGS_p1(pdfgear.com)_1_11zon.webp" 2 </div>
        <div class="page"> "assets/TFG FINAL POR PAGS_p1(pdfgear.com)_1_11zon.webp" 3 </div>
        <div class="page"> "assets/TFG FINAL POR PAGS_p1(pdfgear.com)_1_11zon.webp" 4 </div>
        <div class="hard"> FIN </div>
    </div>

    <script>
        $(document).ready(function () {
            // Inicialización con parámetros corregidos
            $("#flipbook").turn({
                width: 800,
                height: 500,
                autoCenter: true,
                gradients: true,
                acceleration: true
            });
        });

        // Soporte para flechas del teclado
        $(window).bind('keydown', function (e) {
            if (e.keyCode == 37)
                $('#flipbook').turn('previous');
            else if (e.keyCode == 39)
                $('#flipbook').turn('next');
        });
    </script>

</body>

</html>
