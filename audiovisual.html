<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiovisual</title>
    <link rel="stylesheet" href="styleaudiovisual.css">
</head>

<body>
    <!-- logo -->
    <div class="logoportada">
        <a href="portfolio.html">
            <img class="logoportada2" src="assets/logo circular.webp" alt="milogo">
        </a>
    </div>
    <!-- cabecera -->
    <div class="cabecera">
        <h1>Audiovisual</h1>
    </div>
    <nav class="indice">
        <div class="boton1"><a href="#indicefotografia">Fotografía</a></div>
        <div class="boton2"><a href="#indicemotion">Motion Graphics</a></div>
        <div class="boton3"><a href="#indiceedicionvideo">Edición de Video</a></div>
    </nav>
    <!-- carrusel -->
    <section class="contenedorimagenes">
        <img src="assets/DSC03032.avif" alt="Fotografía" class="imagenproyecto">
        <img src="assets/DSC03248.avif" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ02415_3_11zon.webp" alt="Fotografía " class="imagenproyecto">
        <img src="assets/DSC02759.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ08258_11zon.webp" alt="Fotografía " class="imagenproyecto">
        <img src="assets/DSC03342.avif" alt="Fotografía" class="imagenproyecto">
        <img src="assets/DSC02750.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ02774_4_11zon.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/DSC02816.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ08117_7_11zon.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/DSC03160.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/DSC03393.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ08420_11zon.webp" alt="Fotografía " class="imagenproyecto">
        <img src="assets/DSC03437.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/DSC03644.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ08439_11zon.webp" alt="Fotografía " class="imagenproyecto">
        <img src="assets/DSC03685.webp" alt="Fotografía" class="imagenproyecto">
        <img src="assets/SRZ02079_11zon.webp" alt="Fotografía " class="imagenproyecto">
        <img src="assets/SRZ08434_11zon.webp" alt="Fotografía" class="imagenproyecto">

    </section>
    <div class="secciones">
        <!-- seccionfotografia -->
        <div class="habilidadrrss" id="indicefotografia">

            <h2>Fotografía</h2>

            <div class="gridcarteles">

                <div class="cartel">
                    <img src="assets/DSC03032.avif" alt="Fotografía">
                </div>

                <div class="cartel">
                    <img src="assets/DSC03248.avif" alt="Fotografía">

                </div>

                <div class="cartel">
                    <img src="assets/SRZ02415_3_11zon.webp" alt="Fotografía ">

                </div>
                <div class="cartel">
                    <img src="assets/DSC02759.webp" alt="Fotografía">
                </div>


                <div class="cartel">
                    <img src="assets/DSC03342.avif" alt="Fotografía">
                </div>
            </div>
        </div>
        <!-- seccionmotion graphics-->
        <div class="habilidadmotion" id="indicemotion">

            <h2>Motion Graphics</h2>

            <div class="gridcarteles">

                <div class="cartel">
                    <video controls autoplay muted loop src="assets/proyecto logo.mp4"></video>
                </div>
            </div>
        </div>
        <!-- seccionedición video-->
        <div class="habilidadvideo" id="indiceedicionvideo">

            <h2>Edición de Video</h2>

            <div class="gridcarteles">

                <div class="cartelvideo">
                    <a href="https://www.youtube.com/watch?v=58AZPDGpAt8&t=155s"><img src="assets/opcion1.webp"
                            alt="videoyoutube"></a>
                </div>
            </div>
        </div>
    </div>
    <!-- VISOR -->

    <div id="visor">
        <span id="cerrar">&times;</span>
        <img id="imagenGrande">
    </div>

    <!-- BOTON -->
    <button id="volverarriba">↑</button>

    <script>
        const imagenes = document.querySelectorAll(".imagenproyecto");
        const visor = document.getElementById("visor");
        const imagenGrande = document.getElementById("imagenGrande");
        const cerrar = document.getElementById("cerrar");
        const btn = document.getElementById("volverarriba");

        imagenes.forEach(img => {
            img.addEventListener("click", () => {
                visor.style.display = "flex";
                imagenGrande.src = img.src;
            });
        });

        cerrar.addEventListener("click", () => {
            visor.style.display = "none";
        });

        window.addEventListener('scroll', function () {
            if (window.scrollY > 300) {
                btn.style.opacity = '1';
            } else {
                btn.style.opacity = '0';
            }
        });

        btn.addEventListener('click', function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>

</body>

</html>
